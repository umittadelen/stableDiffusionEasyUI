<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
    (function(){
        try {
            var cfg = JSON.parse(localStorage.getItem("tc_settings") || "{}");
            var r = document.documentElement;
            if (cfg.tone1) r.style.setProperty("--tone1", cfg.tone1);
            if (cfg.tone2) r.style.setProperty("--tone2", cfg.tone2);
            if (cfg.tone3) r.style.setProperty("--tone3", cfg.tone3);
        } catch(_) {}
    })();
    </script>
    <style>
        body { min-height: 100dvh; padding: 24px 16px; }
        h1 { margin-bottom: 16px; }
        #toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        #count { font-size: 0.85em; opacity: 0.55; white-space: nowrap; }
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(var(--tone2), 0.6);
            cursor: pointer;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }
        .card .info {
            padding: 8px 10px;
            font-size: 0.78em;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .del {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 6px;
            color: #fff;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .card:hover .del { opacity: 1; }
        #empty { text-align: center; opacity: 0.4; margin-top: 60px; display: none; }
    </style>
</head>
<body>
<h1>⭐ Favorites</h1>

<div id="toolbar" class="glass-panel" style="padding:12px 16px;">
    <span id="count"></span>
    <button class="btn-danger" onclick="clearAll()">Clear All</button>
</div>

<div id="gallery"></div>
<div id="empty">No favorites yet — star an image in the gallery or history.</div>

<script src="/favorites/inject.js"></script>
<script>
async function load() {
    const res  = await fetch("/favorites/list");
    const favs = await res.json();
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    document.getElementById("count").textContent = `${favs.length} image${favs.length !== 1 ? "s" : ""}`;
    if (!favs.length) { document.getElementById("empty").style.display = "block"; return; }
    document.getElementById("empty").style.display = "none";
    favs.forEach(addCard);
}

function addCard(entry) {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = `/favorites/img/${entry.filename}`;
    img.loading = "lazy";
    img.alt = entry.filename;
    img.onclick = () => window.location.href = `/metadata?url=${window.location.origin}/favorites/img/${entry.filename}`;

    const info = document.createElement("div");
    info.className = "info";
    info.textContent = entry.filename;

    const del = document.createElement("button");
    del.className = "del";
    del.title = "Remove from favorites";
    del.textContent = "✕";
    del.onclick = (e) => { e.stopPropagation(); removeEntry(entry.filename, card); };

    card.appendChild(img);
    card.appendChild(info);
    card.appendChild(del);
    document.getElementById("gallery").appendChild(card);
}

async function removeEntry(filename, card) {
    await fetch("/favorites/remove", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename })
    });
    card.remove();
    const n = document.getElementById("gallery").children.length;
    document.getElementById("count").textContent = `${n} image${n !== 1 ? "s" : ""}`;
    if (!n) document.getElementById("empty").style.display = "block";
}

async function clearAll() {
    if (!confirm("Remove all favorites? The files will be deleted.")) return;
    const favs = await (await fetch("/favorites/list")).json();
    await Promise.all(favs.map(e => fetch("/favorites/remove", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: e.filename })
    })));
    load();
}

load();
</script>
</body>
</html>
