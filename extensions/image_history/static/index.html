<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image History</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/styles-new.css">
    <script>
    (function(){
        try {
            var cfg = JSON.parse(localStorage.getItem("tc_settings") || "{}");
            var r = document.documentElement;
            if (cfg.tone1) r.style.setProperty("--tone1", cfg.tone1);
            if (cfg.tone2) r.style.setProperty("--tone2", cfg.tone2);
            if (cfg.tone3) r.style.setProperty("--tone3", cfg.tone3);
        } catch(_) {}
    })();
    </script>
    <style>
        body { min-height: 100dvh; padding: 24px 16px; }
        h1 { margin-bottom: 16px; }
        #toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        #search { flex: 1; min-width: 180px; margin: 0; }
        #count { font-size: 0.85em; opacity: 0.55; white-space: nowrap; }
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(var(--tone2), 0.6);
            cursor: pointer;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }
        .card .info {
            padding: 8px 10px;
            font-size: 0.78em;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .del {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 6px;
            color: #fff;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .card:hover .del { opacity: 1; }
        #sentinel { height: 40px; }
        #empty { text-align: center; opacity: 0.4; margin-top: 60px; display: none; }

    </style>
</head>
<body>
<h1>Image History</h1>

<div id="toolbar" class="glass-panel" style="padding:12px 16px;">
    <input type="text" id="search" placeholder="Search prompt or model…">
    <span id="count"></span>
    <button class="btn-danger" onclick="clearAll()">Clear All</button>
</div>

<div id="gallery"></div>
<div id="empty">No images in history yet.</div>
<div id="sentinel"></div>

<script src="/image_history/inject.js"></script>
<script>
let page = 0, loading = false, exhausted = false, query = "";

function load(reset) {
    if (loading || exhausted) return;
    loading = true;
    if (reset) {
        page = 0; exhausted = false;
        document.getElementById("gallery").innerHTML = "";
        document.getElementById("empty").style.display = "none";
    }
    fetch(`/image_history/list?page=${page}&q=${encodeURIComponent(query)}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById("count").textContent = `${data.total} image${data.total !== 1 ? "s" : ""}`;
            if (data.items.length === 0 && page === 0)
                document.getElementById("empty").style.display = "block";
            data.items.forEach(addCard);
            if ((page + 1) * data.pageSize >= data.total) exhausted = true;
            page++;
            loading = false;
        })
        .catch(() => { loading = false; });
}

function addCard(entry) {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.filename = entry.filename;

    const img = document.createElement("img");
    img.src = `/image_history/img/${entry.filename}`;
    img.loading = "lazy";
    img.alt = entry.prompt || "";
    img.onclick = () => window.location.href = `/metadata?url=${window.location.origin}/image_history/img/${entry.filename}`;

    const info = document.createElement("div");
    info.className = "info";
    info.textContent = entry.prompt || entry.filename;

    const del = document.createElement("button");
    del.className = "del";
    del.title = "Delete";
    del.textContent = "✕";
    del.onclick = (e) => { e.stopPropagation(); deleteEntry(entry.filename, card); };

    card.appendChild(img);
    card.appendChild(info);
    card.appendChild(del);
    document.getElementById("gallery").appendChild(card);
}

function deleteEntry(filename, card) {
    fetch("/image_history/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename })
    }).then(() => {
        card.remove();
        const remaining = document.getElementById("gallery").children.length;
        document.getElementById("count").textContent = `${remaining} image${remaining !== 1 ? "s" : ""}`;
        if (remaining === 0) document.getElementById("empty").style.display = "block";
    });
}

async function clearAll() {
    if (!confirm("Delete entire image history? This cannot be undone.")) return;
    await fetch("/image_history/clear", { method: "POST" });
    document.getElementById("gallery").innerHTML = "";
    document.getElementById("count").textContent = "0 images";
    document.getElementById("empty").style.display = "block";
    exhausted = false; page = 0;
}

// Search
let _searchTimer;
document.getElementById("search").addEventListener("input", function() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => { query = this.value; load(true); }, 300);
});

// Infinite scroll
const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) load(false);
}, { rootMargin: "200px" });
observer.observe(document.getElementById("sentinel"));

load(true);
</script>
</body>
</html>
